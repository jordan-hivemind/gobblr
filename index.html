<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0e0e10" />
  <title>Gobblr — Meet Turkeys Near You</title>
  <meta name="description" content="Gobblr is the world's #1 social network for turkeys. Browse, gobble, and strut your way to a connection — right in your coop." />
  <link rel="preconnect" href="https://images.pexels.com" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A6%83%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- Top bar -->
    <header class="topbar">
      <button class="topbar__icon" id="navBack" aria-label="Back" hidden>
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="brand" id="brandHome">
        <span class="brand__mark">🦃</span>
        <span class="brand__word">Gobblr</span>
      </div>
      <h1 class="topbar__title" id="topbarTitle" hidden></h1>
      <div class="topbar__actions">
        <button class="topbar__icon" id="openSearch" aria-label="Search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </button>
        <button class="topbar__icon" id="openFilter" aria-label="Filters">
          <svg viewBox="0 0 24 24"><path d="M3 5h18M6 12h12M10 19h4"/></svg>
          <span class="topbar__dot" id="filterDot" hidden></span>
        </button>
      </div>
    </header>

    <!-- Search row (collapsible) -->
    <div class="searchrow" id="searchRow" hidden>
      <svg class="searchrow__icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="searchInput" class="searchrow__input" type="text" placeholder="Search by name, tribe, or bio…" autocomplete="off" />
      <button class="searchrow__clear" id="searchClear" aria-label="Clear">✕</button>
    </div>

    <!-- Main scroll area -->
    <main class="screen" id="screen"></main>

    <!-- Bottom nav -->
    <nav class="tabbar" id="tabbar">
      <button class="tab is-active" data-tab="browse">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span>Browse</span>
      </button>
      <button class="tab" data-tab="gobbles">
        <svg viewBox="0 0 24 24"><path d="M12 21s-7.5-4.6-10-9.2C.3 8.4 2 4.5 5.6 4.5c2 0 3.4 1.1 4.4 2.6 1-1.5 2.4-2.6 4.4-2.6 3.6 0 5.3 3.9 3.6 7.3C19.5 16.4 12 21 12 21z"/></svg>
        <span>Gobbles</span>
        <em class="tab__badge" id="badgeGobbles">5</em>
      </button>
      <button class="tab" data-tab="messages">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 9.7 9.7 0 0 1-4.5-1L3 20l1.2-4A8.3 8.3 0 0 1 3 11.5 8.4 8.4 0 0 1 12 3a8.4 8.4 0 0 1 9 8.5z"/></svg>
        <span>Messages</span>
        <em class="tab__badge" id="badgeMessages">3</em>
      </button>
      <button class="tab" data-tab="profile">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-6.5 8-6.5s8 2.5 8 6.5"/></svg>
        <span>Profile</span>
      </button>
    </nav>
  </div>

  <!-- Profile detail sheet -->
  <div class="sheet" id="profileSheet" hidden>
    <div class="sheet__backdrop" data-close-sheet></div>
    <div class="sheet__panel" id="profilePanel" role="dialog" aria-modal="true"></div>
  </div>

  <!-- Filter sheet -->
  <div class="sheet" id="filterSheet" hidden>
    <div class="sheet__backdrop" data-close-sheet></div>
    <div class="sheet__panel sheet__panel--bottom" role="dialog" aria-modal="true">
      <div class="sheet__handle"></div>
      <h2 class="sheet__h">Filters</h2>
      <div class="filter">
        <label class="filter__row">
          <span>Strutting now only</span>
          <input type="checkbox" id="fOnline" class="switch" />
        </label>
        <div class="filter__block">
          <div class="filter__label">Maximum distance <em id="fDistVal">25 mi</em></div>
          <input type="range" id="fDist" min="1" max="50" value="25" class="range" />
        </div>
        <div class="filter__block">
          <div class="filter__label">Tribes</div>
          <div class="chips" id="fTribes"></div>
        </div>
      </div>
      <div class="sheet__footer">
        <button class="btn btn--ghost" id="filterReset">Reset</button>
        <button class="btn btn--primary" id="filterApply">Show <span id="filterCount"></span> turkeys</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
